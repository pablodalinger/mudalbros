<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MU DalBros — Season 6 · Servidor Privado</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #d4a843;
  --gold-light: #f0c85a;
  --blue: #1a5fb8;
  --blue-light: #4a9eff;
  --blue-glow: rgba(74,158,255,0.3);
  --red: #c23b22;
  --red-light: #ff4d30;
  --bg: #060812;
  --bg2: #0b0f1e;
  --bg3: #0f1428;
  --panel: rgba(11,15,30,0.92);
  --text: #ddd8c8;
  --text-muted: #7a7a9a;
  --border: rgba(212,168,67,0.18);
  --border-blue: rgba(74,158,255,0.2);
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  line-height: 1.6;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(6,8,18,0.96);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  height: 58px;
  display: flex; align-items: center;
  padding: 0 2rem;
  gap: 2rem;
}

.nav-logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; flex-shrink: 0;
}

.nav-logo img {
  height: 38px;
  filter: drop-shadow(0 0 6px rgba(212,168,67,0.5));
}

.nav-links {
  display: flex; gap: 0; list-style: none; flex: 1;
}

.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0 1rem;
  height: 58px;
  display: flex; align-items: center;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}

.nav-links a:hover { color: var(--text); }
.nav-links a.active { color: var(--gold); border-bottom-color: var(--gold); }

.nav-actions {
  display: flex; gap: 0.6rem; align-items: center;
}

.nav-btn {
  padding: 0.45rem 1.1rem;
  border-radius: 3px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.nav-btn-gold {
  background: var(--gold);
  color: #1a0f00;
}
.nav-btn-gold:hover { background: var(--gold-light); }

.nav-btn-discord {
  background: #5865F2;
  color: #fff;
  display: flex; align-items: center; gap: 6px;
}
.nav-btn-discord:hover { background: #6b77ff; }

.nav-social-btn {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(255,255,255,0.07); color: var(--text-muted);
  transition: background 0.2s, color 0.2s; text-decoration: none;
}
.nav-social-btn:hover { background: var(--gold); color: #000; }

#nav-hamburger { display: none; }

/* ── HERO ── */
#hero {
  position: relative;
  height: 100vh; min-height: 620px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
  padding-top: 58px;
}

.hero-bg {
  position: absolute; inset: 0; z-index: 0;
  background: var(--bg) url('images/DarkLord.png') center top/cover no-repeat;
}

.hero-bg::before {
  content: '';
  position: absolute; inset: 0;
  background:
    linear-gradient(to bottom, rgba(6,8,18,0.25) 0%, rgba(6,8,18,0.15) 40%, rgba(6,8,18,0.75) 80%, rgba(6,8,18,1) 100%);
}

.hero-content {
  position: relative; z-index: 2;
  text-align: center;
  padding: 0 1rem;
  max-width: 700px;
}

.hero-logo {
  width: 520px; max-width: 80vw;
  margin: 0 auto 1.5rem;
  margin-top: -80px;
  filter: drop-shadow(0 0 40px rgba(212,168,67,0.7)) drop-shadow(0 0 80px rgba(212,168,67,0.3));
  animation: float 4s ease-in-out infinite, logo-flash 6s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.hero-logo {
  animation: float 4s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(255,255,255,0.9)) drop-shadow(0 0 70px rgba(255,255,255,0.5));
}

/* ── DL HAIR GLOW ── */
#dl-hair-glow {
  position: absolute;
  left: 18%; top: 36%;
  transform: translate(-50%, -50%);
  width: 300px; height: 160px;
  border-radius: 50%;
  background: radial-gradient(ellipse at center,
    rgba(255,255,255,0.5) 0%,
    rgba(220,235,255,0.18) 45%,
    transparent 68%);
  pointer-events: none;
  z-index: 1;
  animation: dl-hair-pulse 4s ease-in-out infinite;
}
@keyframes dl-hair-pulse {
  0%,100% { opacity: 0.15; }
  50%      { opacity: 1; }
}
.hint-pulse {
  opacity: 0.45;
  animation: hint-glow 3s ease-in-out infinite;
}
@keyframes hint-glow {
  0%,100% { opacity: 0.45; text-shadow: none; }
  50%     { opacity: 1; text-shadow: 0 0 10px rgba(212,168,67,0.9), 0 0 24px rgba(212,168,67,0.5); }
}

/* ── CHAIN IMPACT GLOW ── */
#chain-glow {
  position: absolute;
  left: 70%; top: 58%;
  transform: translate(-50%, -50%);
  width: 480px; height: 260px;
  border-radius: 50%;
  background: radial-gradient(ellipse at center,
    rgba(255,90,10,0.75) 0%,
    rgba(255,40,0,0.45) 35%,
    rgba(200,20,0,0.15) 60%,
    transparent 75%);
  pointer-events: none;
  z-index: 1;
  animation: chain-pulse 5s ease-in-out infinite;
}
@keyframes chain-pulse {
  0%,100% { opacity: 0.08; transform: translate(-50%,-50%) scale(0.92); }
  50%      { opacity: 1;    transform: translate(-50%,-50%) scale(1.22); }
}

/* ── CANVAS PARTICLES (toda la página) ── */
#hero-canvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1;
}

/* ── SCROLL FADE-IN CARDS ── */
.anim-fadein {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.55s ease, transform 0.55s ease;
}
.anim-fadein.visible {
  opacity: 1;
  transform: translateY(0);
}

.hero-label {
  font-size: 0.72rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--blue-light);
  margin-bottom: 0.4rem;
}

.hero-title {
  font-size: clamp(2.8rem, 7vw, 5rem);
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 60px rgba(74,158,255,0.4), 0 0 20px rgba(212,168,67,0.3), 0 3px 0 rgba(0,0,0,0.9);
  letter-spacing: 0.04em;
  line-height: 1;
  margin-bottom: 0.5rem;
}

.hero-sub {
  font-size: 0.88rem;
  color: var(--text-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 2rem;
}

.hero-btns {
  display: flex; gap: 0.75rem;
  justify-content: center; flex-wrap: wrap;
  margin-bottom: 0;
}

.btn-hero-main {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0.85rem 2.2rem;
  background: linear-gradient(135deg, #b8941e, #e0b840);
  color: #1a0f00;
  font-size: 0.88rem; font-weight: 800;
  letter-spacing: 0.12em; text-transform: uppercase;
  text-decoration: none; border-radius: 3px;
  box-shadow: 0 4px 25px rgba(212,168,67,0.4);
  transition: all 0.2s;
}
.btn-hero-main:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 35px rgba(212,168,67,0.55); }

.btn-hero-disc {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0.85rem 2rem;
  background: #5865F2;
  color: #fff;
  font-size: 0.88rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  text-decoration: none; border-radius: 3px;
  transition: all 0.2s;
}
.btn-hero-disc:hover { background: #6b77ff; transform: translateY(-1px); }

/* ── STAT BAR ── */
#statbar {
  position: relative; z-index: 3;
  background: rgba(6,8,18,0.97);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.statbar-inner {
  max-width: 1000px; margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  divide: 1px solid var(--border);
}

.statbar-item {
  padding: 1.4rem 1rem;
  text-align: center;
  border-right: 1px solid var(--border);
  position: relative;
}
.statbar-item:last-child { border-right: none; }

.statbar-icon { font-size: 1.3rem; margin-bottom: 0.4rem; }

.statbar-val {
  font-size: 1.8rem; font-weight: 800;
  color: var(--gold);
  text-shadow: 0 0 15px rgba(212,168,67,0.3);
  line-height: 1;
}

.statbar-label {
  font-size: 0.65rem; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--text-muted);
  margin-top: 0.3rem;
}

/* ── SECTION ── */
.section-inner { max-width: 1100px; margin: 0 auto; padding: 5rem 1.5rem; }

.section-head { text-align: center; margin-bottom: 3rem; }

.s-label {
  font-size: 0.7rem; letter-spacing: 0.35em;
  text-transform: uppercase; color: var(--blue-light);
  margin-bottom: 0.4rem;
}

.s-title {
  font-size: clamp(1.7rem, 4vw, 2.4rem);
  font-weight: 800; color: #fff;
  text-shadow: 0 0 30px rgba(74,158,255,0.2);
}

.s-title span { color: var(--gold); }

.s-line {
  width: 50px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--blue-light), transparent);
  margin: 0.9rem auto 0;
}

/* ── FEATURES ── */
#features {
  background: var(--bg2);
  position: relative;
}
#features::before {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  background: url('images/ChatGPT Image Jun 8, 2026, 02_48_49 PM.png') center center/cover no-repeat;
  opacity: 0.08;
}
#features .section-inner { position: relative; z-index: 1; }

.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.feature-card {
  background: var(--bg2);
  padding: 2rem 1.75rem;
  position: relative;
  overflow: hidden;
  transition: background 0.2s;
}
.feature-card:hover { background: var(--bg3); }

.feature-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--blue-light), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}
.feature-card:hover::after { opacity: 1; }

.feat-icon {
  width: 48px; height: 48px; border-radius: 10px;
  background: rgba(74,158,255,0.1);
  border: 1px solid rgba(74,158,255,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
  margin-bottom: 1rem;
}

.feat-icon.gold { background: rgba(212,168,67,0.1); border-color: rgba(212,168,67,0.25); }
.feat-icon.red  { background: rgba(194,59,34,0.1);  border-color: rgba(194,59,34,0.25); }

.feat-title {
  font-size: 1rem; font-weight: 700;
  color: var(--gold); margin-bottom: 0.4rem;
}

.feat-desc {
  font-size: 0.8rem; color: var(--text-muted); line-height: 1.6;
}

/* ── CLIENT FEATURES ── */
#client-features {
  background: var(--bg);
  position: relative;
}
#client-features::before {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  background: url('images/ChatGPT Image Jun 8, 2026, 02_48_49 PM.png') center center/cover no-repeat;
  opacity: 0.06;
}
#client-features .section-inner { position: relative; z-index: 1; }

.cf-highlight {
  background: linear-gradient(135deg, rgba(212,168,67,0.07), rgba(212,168,67,0.03));
  border: 1px solid rgba(212,168,67,0.35);
  border-radius: 8px;
  padding: 2rem 2.5rem;
  margin-bottom: 2rem;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 1.5rem;
  align-items: flex-start;
  position: relative;
  overflow: hidden;
}
.cf-highlight::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.cf-highlight-badge {
  display: inline-block;
  background: rgba(212,168,67,0.15);
  border: 1px solid rgba(212,168,67,0.4);
  color: var(--gold);
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 2px;
  margin-bottom: 0.6rem;
}

.cf-hl-icon {
  width: 64px; height: 64px; border-radius: 12px;
  background: rgba(212,168,67,0.1);
  border: 1px solid rgba(212,168,67,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; flex-shrink: 0;
}

.cf-hl-title {
  font-size: 1.3rem; font-weight: 800;
  color: var(--gold); margin-bottom: 0.4rem;
}

.cf-hl-key {
  display: inline-block;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 4px;
  padding: 2px 10px;
  font-family: monospace;
  font-size: 0.85rem;
  color: #fff;
  margin-right: 6px;
  letter-spacing: 0.05em;
}

.cf-hl-desc {
  font-size: 0.85rem; color: var(--text-muted);
  line-height: 1.7; margin-top: 0.4rem;
}

.cf-hl-sub {
  display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.75rem;
}

.cf-pill {
  background: rgba(74,158,255,0.08);
  border: 1px solid rgba(74,158,255,0.2);
  color: var(--blue-light);
  font-size: 0.85rem;
  padding: 6px 16px;
  border-radius: 20px;
  transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
  cursor: pointer;
}
.cf-pill:hover {
  background: rgba(74,158,255,0.22);
  border-color: rgba(74,158,255,0.7);
  color: #fff;
  box-shadow: 0 0 10px rgba(74,158,255,0.35);
}

.cf-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1rem;
}

.cf-card {
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px;
  padding: 1.25rem 1.5rem;
  display: grid;
  grid-template-columns: 40px 1fr;
  gap: 1rem;
  align-items: flex-start;
  transition: border-color 0.2s;
}
.cf-card:hover { border-color: rgba(212,168,67,0.3); }

.cf-card-icon {
  width: 40px; height: 40px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; flex-shrink: 0;
}
.cf-card-icon.blue { background: rgba(74,158,255,0.1); border: 1px solid rgba(74,158,255,0.2); }
.cf-card-icon.gold { background: rgba(212,168,67,0.1); border: 1px solid rgba(212,168,67,0.2); }
.cf-card-icon.red  { background: rgba(194,59,34,0.1);  border: 1px solid rgba(194,59,34,0.2);  }

.cf-card-title {
  font-size: 0.88rem; font-weight: 700;
  color: var(--text); margin-bottom: 0.3rem;
}
.cf-card-desc {
  font-size: 0.75rem; color: var(--text-muted); line-height: 1.5;
}
.cf-card-key {
  display: inline-block;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 3px;
  padding: 1px 7px;
  font-family: monospace;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.7);
  margin-right: 4px;
}

/* ── CARD MODAL ── */
.has-modal { cursor: pointer; }
.modal-hint {
  font-size: 0.7rem; opacity: 0.45;
  margin-left: 4px; user-select: none;
}
.has-modal:hover .modal-hint { opacity: 0.9; }

#card-modal {
  display: none;
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  top: 50% !important;
  left: 50% !important;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.92);
  border: 1px solid rgba(212,168,67,0.5);
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 12px 60px rgba(0,0,0,0.9);
  max-width: 90vw;
  max-height: 90vh;
}
#card-modal img {
  display: block;
  width: 85vw;
  max-height: 85vh;
  object-fit: contain;
  border-radius: 6px;
}

/* ── EVENTS ── */
#events {
  position: relative;
  background: var(--bg2);
}
#events::before {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  background: url('images/ChatGPT Image Jun 4, 2026, 12_33_22 AM.png') center top/cover no-repeat;
  opacity: 0.07;
}
#events .section-inner { position: relative; z-index: 1; }

.events-tabs {
  display: flex; gap: 0.4rem;
  margin-bottom: 2rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding-bottom: 1px;
}

.etab {
  padding: 0.6rem 1.4rem;
  font-size: 0.78rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color 0.2s, border-color 0.2s;
  user-select: none;
}
.etab.active { color: var(--blue-light); border-bottom-color: var(--blue-light); }
.etab:hover:not(.active) { color: var(--text); }

.ev-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 1rem;
}

.ev-card {
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 5px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s;
  position: relative;
}
.ev-card:hover { border-color: var(--blue-light); transform: translateY(-3px); }

.ev-thumb {
  height: 110px;
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem;
  position: relative;
  overflow: hidden;
}

.ev-thumb.bc  { background: linear-gradient(135deg, #1a0505, #3d0808); }
.ev-thumb.cc  { background: linear-gradient(135deg, #0d0520, #2a0d50); }
.ev-thumb.ds  { background: linear-gradient(135deg, #1a0800, #4a1800); }
.ev-thumb.it  { background: linear-gradient(135deg, #001a10, #003320); }
.ev-thumb.sk  { background: linear-gradient(135deg, #080808, #1a1a1a); }
.ev-thumb.rd  { background: linear-gradient(135deg, #1a0302, #3d0704); }
.ev-thumb.gd  { background: linear-gradient(135deg, #1a1200, #403000); }
.ev-thumb.ww  { background: linear-gradient(135deg, #080d1a, #0f1e3d); }
.ev-thumb.med { background: linear-gradient(135deg, #0d1a08, #1a3d10); }
.ev-thumb.sea { background: linear-gradient(135deg, #030a1a, #071e40); }
.ev-thumb.lw  { background: linear-gradient(135deg, #1a0f00, #402500); }
.ev-thumb.ib  { background: linear-gradient(135deg, #0a0a1a, #1a1a3d); }

.ev-thumb::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 40%, var(--bg2) 100%);
}

.ev-body { padding: 0.75rem; }

.ev-name {
  font-size: 0.82rem; font-weight: 700;
  color: var(--text); margin-bottom: 0.25rem;
}

.ev-sub {
  font-size: 0.7rem; color: var(--text-muted); line-height: 1.4;
}

.ev-badge {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 2px;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 0.4rem;
}

.ev-badge.activo { background: rgba(74,158,255,0.15); color: var(--blue-light); border: 1px solid rgba(74,158,255,0.3); }
.ev-badge.especial { background: rgba(212,168,67,0.12); color: var(--gold); border: 1px solid rgba(212,168,67,0.3); }

/* ── CTA ── */
#cta {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

#cta::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(74,158,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 50%, rgba(212,168,67,0.06) 0%, transparent 60%);
}

.cta-inner {
  position: relative; z-index: 1;
  max-width: 700px; margin: 0 auto;
  padding: 5rem 1.5rem;
  text-align: center;
}

.cta-title {
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 900; color: #fff;
  text-shadow: 0 0 40px rgba(74,158,255,0.3);
  line-height: 1.15;
  margin-bottom: 0.75rem;
}

.cta-title span { color: var(--gold); }

.cta-sub {
  font-size: 0.9rem; color: var(--text-muted);
  margin-bottom: 2.5rem;
}

.cta-btns {
  display: flex; gap: 1rem;
  justify-content: center; flex-wrap: wrap;
}

.btn-cta {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 1rem 2.5rem;
  border-radius: 3px;
  font-size: 0.9rem; font-weight: 800;
  letter-spacing: 0.12em; text-transform: uppercase;
  text-decoration: none; transition: all 0.2s;
}

.btn-cta-main {
  background: linear-gradient(135deg, #b8941e, #e0b840);
  color: #1a0f00;
  box-shadow: 0 4px 30px rgba(212,168,67,0.4);
}
.btn-cta-main:hover { filter: brightness(1.1); transform: translateY(-1px); }

.btn-cta-sec {
  background: transparent;
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.15);
}
.btn-cta-sec:hover { border-color: var(--gold); color: var(--gold); }

/* ── RANKING ── */
#ranking { background: var(--bg); }

.rank-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 1.5rem;
}

.rank-panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.rank-panel-head {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}

.rank-panel-icon { font-size: 1rem; }

.rank-panel-title {
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold);
}

table.rtable {
  width: 100%; border-collapse: collapse; font-size: 0.82rem;
}

table.rtable td {
  padding: 0.7rem 1.25rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  color: var(--text);
}

table.rtable tr:last-child td { border-bottom: none; }
table.rtable tr:hover td { background: rgba(255,255,255,0.02); }

.rpos { width: 32px; font-weight: 700; color: var(--text-muted); }
.rpos.g { color: #ffd700; }
.rpos.s { color: #c0c0c0; }
.rpos.b { color: #cd7f32; }

.rname { font-weight: 600; }
.rval  { text-align: right; color: var(--gold); font-weight: 600; }
.rmut  { color: var(--text-muted); font-size: 0.74rem; }

.rank-empty {
  text-align: center; padding: 2rem;
  font-size: 0.78rem; color: var(--text-muted); font-style: italic;
}

/* ── DOWNLOAD ── */
#download {
  background: var(--bg2);
  border-top: 1px solid var(--border);
}

.dl-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem;
  align-items: center;
}

@media(max-width:680px){ .dl-grid { grid-template-columns: 1fr; } }

.dl-left h2 {
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 800; color: #fff;
  margin-bottom: 0.75rem;
}
.dl-left h2 span { color: var(--gold); }

.dl-left p {
  font-size: 0.85rem; color: var(--text-muted);
  margin-bottom: 1.5rem; line-height: 1.7;
}

.dl-specs {
  display: flex; flex-wrap: wrap; gap: 1rem;
  margin-bottom: 2rem;
}

.dl-spec {
  display: flex; align-items: center; gap: 7px;
  font-size: 0.78rem; color: var(--text-muted);
}
.dl-spec::before { content: '✓'; color: var(--blue-light); font-weight: 700; }

.dl-btns { display: flex; gap: 0.75rem; flex-wrap: wrap; }

.dl-right {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2rem;
}

.dl-right h4 {
  font-size: 0.72rem; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 1.25rem;
}

.dl-steps { list-style: none; counter-reset: s; display: flex; flex-direction: column; gap: 1rem; }

.dl-steps li {
  counter-increment: s;
  display: flex; align-items: flex-start; gap: 12px;
  font-size: 0.82rem; color: var(--text-muted);
}

.dl-steps li::before {
  content: counter(s);
  min-width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(74,158,255,0.15);
  border: 1px solid rgba(74,158,255,0.3);
  color: var(--blue-light);
  font-size: 0.65rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}

.dl-steps li strong { color: var(--text); }

/* ── FOOTER IMAGE ── */
#footer-char {
  position: relative;
  height: 620px;
  background: var(--bg) url('images/MagicGladiator.png') center center/cover no-repeat;
  overflow: hidden;
}
#footer-char::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(6,8,18,0.7) 0%,
    rgba(6,8,18,0) 15%,
    rgba(6,8,18,0) 80%,
    rgba(6,8,18,1) 100%
  );
}

/* ── FOOTER ── */
footer {
  background: #040609;
  border-top: none;
  padding: 3rem 1.5rem 1.5rem;
}

.footer-grid {
  max-width: 1100px; margin: 0 auto;
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 2.5rem;
  margin-bottom: 2.5rem;
}

@media(max-width:700px){ .footer-grid { grid-template-columns: 1fr 1fr; } }

.footer-brand img {
  height: 44px; margin-bottom: 1rem;
  filter: drop-shadow(0 0 8px rgba(212,168,67,0.4));
}

.footer-brand p {
  font-size: 0.78rem; color: var(--text-muted); line-height: 1.6;
  max-width: 240px;
}

.footer-col h5 {
  font-size: 0.68rem; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 0.75rem; font-weight: 600;
}

.footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }

.footer-col ul a {
  color: var(--text-muted); text-decoration: none;
  font-size: 0.8rem; transition: color 0.2s;
}
.footer-col ul a:hover { color: var(--text); }

.footer-stats {
  max-width: 1100px; margin: 0 auto;
  padding-top: 1.5rem;
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 1rem;
}

.footer-copy {
  font-size: 0.7rem; color: var(--text-muted); opacity: 0.5;
}

.footer-info {
  font-size: 0.7rem; color: var(--text-muted);
  display: flex; gap: 1rem; flex-wrap: wrap;
}

.footer-info span { display: flex; align-items: center; gap: 5px; }

.online-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #22cc44; box-shadow: 0 0 5px #22cc44;
  animation: p 2s infinite;
}
@keyframes p { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── IP COPY ── */
.ip-pill {
  display: inline-flex; align-items: center; gap: 10px;

<script>(function(){
  var ls=document.querySelectorAll(".nav-links a");
  function setActive(src){ls.forEach(function(l){l.classList.remove("active");if(l.getAttribute("href")===src)l.classList.add("active");});}
  ls.forEach(function(l){l.addEventListener("click",function(){setActive(l.getAttribute("href"));closeMenu();});});

  /* ── HAMBURGER ── */
  var btn=document.getElementById("nav-hamburger");
  var menu=document.getElementById("nav-links");
  var frame=document.getElementById("shell-frame");
  var nav=document.querySelector("nav");

  function closeMenu(){menu.classList.remove("open");btn.innerHTML="&#9776;";updateFrame();}
  function updateFrame(){
    var h=nav.getBoundingClientRect().height;
    frame.style.top=h+"px";
    frame.style.height="calc(100vh - "+h+"px)";
  }

  btn.addEventListener("click",function(e){
    e.stopPropagation();
    var isOpen=menu.classList.toggle("open");
    btn.innerHTML=isOpen?"&#10005;":"&#9776;";
    updateFrame();
  });

  /* Cerrar al tocar el iframe */
  frame.addEventListener("load",function(){updateFrame();});
  window.addEventListener("resize",function(){if(!menu.classList.contains("open"))updateFrame();});
})();</script>

<script>(function(){var canvas=document.getElementById('global-sparks'),ctx=canvas.getContext('2d'),W,H,particles=[];function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}resize();window.addEventListener('resize',resize);function rand(a,b){return a+Math.random()*(b-a);}function Particle(){this.reset();}Particle.prototype.reset=function(){this.x=rand(0,W);this.y=rand(H*0.2,H);this.vx=rand(-0.4,0.4);this.vy=rand(-1.4,-0.4);this.size=rand(2.5,5.5);this.life=0;this.maxLife=rand(80,200);var r=Math.floor(rand(200,255)),g=Math.floor(rand(60,140));this.color='rgba('+r+','+g+',20,';};Particle.prototype.update=function(){this.life++;this.x+=this.vx;this.y+=this.vy;this.vx+=rand(-0.05,0.05);if(this.life>=this.maxLife)this.reset();};Particle.prototype.draw=function(){var t=this.life/this.maxLife,alpha=t<0.2?t/0.2:1-(t-0.2)/0.8;alpha=Math.max(0,Math.min(1,alpha))*0.75;ctx.beginPath();ctx.arc(this.x,this.y,this.size*(1-t*0.5),0,Math.PI*2);ctx.fillStyle=this.color+alpha+')';ctx.fill();};for(var i=0;i<60;i++){var p=new Particle();p.life=Math.floor(rand(0,p.maxLife));particles.push(p);}function loop(){ctx.clearRect(0,0,W,H);for(var i=0;i<particles.length;i++){particles[i].update();particles[i].draw();}requestAnimationFrame(loop);}loop();})();</script>

  <div id="elflala-panel">
    <div id="elflala-header">
      <span id="elflala-header-name">Elf Lala</span>
      <button id="elflala-close" aria-label="Cerrar chat">&#10005;</button>
    </div>
    <div id="elflala-messages"></div>
    <div id="elflala-inputbar">
      <input id="elflala-input" type="text" placeholder="Consultá lo que quieras..." maxlength="300">
      <button id="elflala-send" aria-label="Enviar">&#10148;</button>
    </div>
  </div>
</div>
<style>
#elflala-widget { position: fixed; bottom: 1.2rem; right: 1.2rem; z-index: 3000; font-family: inherit; }
#elflala-toggle {
  width: 260px; height: 260px; border-radius: 50%;
  background: linear-gradient(135deg, #b8941e, #e0b840);
  border: none; cursor: pointer;
  box-shadow: 0 4px 24px rgba(212,168,67,0.45);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s;
  padding: 0; overflow: hidden;
}
#elflala-toggle:hover { transform: scale(1.05); }
#elflala-toggle-icon { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
#elflala-teaser {
  position: absolute; bottom: 278px; right: 0;
  width: 220px;
  background: rgba(10,9,16,0.98);
  border: 1px solid rgba(212,168,67,0.35);
  border-radius: 12px;
  padding: 0.7rem 0.9rem;
  color: #e8e6f0; font-size: 0.82rem; line-height: 1.4;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
#elflala-teaser::after {
  content: ''; position: absolute; bottom: -7px; right: 34px;
  width: 14px; height: 14px;
  background: rgba(10,9,16,0.98);
  border-right: 1px solid rgba(212,168,67,0.35);
  border-bottom: 1px solid rgba(212,168,67,0.35);
  transform: rotate(45deg);
}
#elflala-widget.open #elflala-teaser { display: none; }
#elflala-panel {
  display: none;
  position: absolute; bottom: 272px; right: 0;
  width: 320px; height: 440px;
  background: rgba(10,9,16,0.98);
  border: 1px solid rgba(212,168,67,0.3);
  border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  flex-direction: column;
  overflow: hidden;
}
#elflala-panel.open { display: flex; }
#elflala-header {
  padding: 0.85rem 1rem;
  background: rgba(212,168,67,0.08);
  border-bottom: 1px solid rgba(212,168,67,0.2);
  display: flex; align-items: center; justify-content: space-between;
}
#elflala-header-name { font-weight: 700; color: #f0c85a; font-size: 0.95rem; }
#elflala-close { background: none; border: none; color: #7a7a9a; cursor: pointer; font-size: 0.85rem; padding: 4px; }
#elflala-close:hover { color: #f0c85a; }
#elflala-messages {
  flex: 1; overflow-y: auto; padding: 0.9rem;
  display: flex; flex-direction: column; gap: 0.6rem;
}
.elflala-msg { font-size: 0.85rem; line-height: 1.5; padding: 0.55rem 0.75rem; border-radius: 10px; max-width: 85%; }
.elflala-msg.bot { background: rgba(212,168,67,0.1); color: #e8e6f0; align-self: flex-start; border: 1px solid rgba(212,168,67,0.2); }
.elflala-msg.user { background: rgba(74,158,255,0.12); color: #e8e6f0; align-self: flex-end; border: 1px solid rgba(74,158,255,0.25); }
.elflala-msg.typing { color: #7a7a9a; font-style: italic; }
#elflala-inputbar {
  display: flex; gap: 0.4rem; padding: 0.7rem;
  border-top: 1px solid rgba(212,168,67,0.2);
}
#elflala-input {
  flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,168,67,0.25);
  border-radius: 8px; padding: 0.5rem 0.7rem; color: #e8e6f0; font-size: 0.85rem; outline: none;
}
#elflala-input:focus { border-color: #d4a843; }
#elflala-send {
  background: #d4a843; border: none; border-radius: 8px; width: 38px;
  color: #1a0f00; font-size: 0.9rem; cursor: pointer;
}
#elflala-send:hover { background: #f0c85a; }
@media (max-width: 480px) {
  #elflala-panel { width: 88vw; right: -0.4rem; }
}
</style>
<script>
(function(){
  var WORKER_URL = "https://elflalamudalbros.pablodalinger77.workers.dev";

  var widget = document.getElementById('elflala-widget');
  var toggle = document.getElementById('elflala-toggle');
  var panel = document.getElementById('elflala-panel');
  var closeBtn = document.getElementById('elflala-close');
  var messages = document.getElementById('elflala-messages');
  var input = document.getElementById('elflala-input');
  var sendBtn = document.getElementById('elflala-send');
  var history = [];
  var greeted = false;

  function addMsg(text, role){
    var div = document.createElement('div');
    div.className = 'elflala-msg ' + role;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function openPanel(){
    panel.classList.add('open');
    if (!greeted) {
      addMsg('¡Hola, guerrero! ¿En qué puedo ayudarte hoy?', 'bot');
      greeted = true;
    }
    input.focus();
  }

  toggle.addEventListener('click', function(){
    if (panel.classList.contains('open')) { panel.classList.remove('open'); widget.classList.remove('open'); }
    else { openPanel(); widget.classList.add('open'); }
  });
  closeBtn.addEventListener('click', function(){ panel.classList.remove('open'); widget.classList.remove('open'); });

  function send(){
    var text = input.value.trim();
    if (!text) return;
    addMsg(text, 'user');
    history.push({ role: 'user', text: text });
    input.value = '';
    var typing = addMsg('Elf Lala está escribiendo...', 'typing');

    fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history })
    }).then(function(r){ return r.json(); }).then(function(data){
      typing.remove();
      var reply = data.reply || 'Perdón, no pude responder. Probá de nuevo o preguntá en nuestro Discord.';
      addMsg(reply, 'bot');
      history.push({ role: 'bot', text: reply });
    }).catch(function(){
      typing.remove();
      addMsg('No me pude conectar. Probá de nuevo en un rato o preguntá en nuestro Discord.', 'bot');
    });
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', function(e){ if (e.key === 'Enter') send(); });
})();
</script>
</body>
</html>
