<meta charset="UTF-8">

<title>Eventos — MU DalBros</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #d4a843;
  --gold-light: #f0c85a;
  --blue: #1a5fb8;
  --blue-light: #4a9eff;
  --blue-glow: rgba(74,158,255,0.3);
  --red: #c23b22;
  --red-light: #ff4d30;
  --bg: #060812;
  --bg2: #0b0f1e;
  --bg3: #0f1428;
  --panel: rgba(11,15,30,0.92);
  --text: #ddd8c8;
  --text-muted: #7a7a9a;
  --border: rgba(212,168,67,0.18);
  --border-blue: rgba(74,158,255,0.2);
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  line-height: 1.6;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(6,8,18,0.96);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  height: 58px;
  display: flex; align-items: center;
  padding: 0 2rem;
  gap: 2rem;
}

.nav-logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none; flex-shrink: 0;
}

.nav-logo img {
  height: 38px;
  filter: drop-shadow(0 0 6px rgba(212,168,67,0.5));
}

.nav-links {
  display: flex; gap: 0; list-style: none; flex: 1;
}

.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0 1rem;
  height: 58px;
  display: flex; align-items: center;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}

.nav-links a:hover { color: var(--text); }
.nav-links a.active { color: var(--gold); border-bottom-color: var(--gold); }

.nav-actions {
  display: flex; gap: 0.6rem; align-items: center;
}

.nav-btn {
  padding: 0.45rem 1.1rem;
  border-radius: 3px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.nav-btn-gold {
  background: var(--gold);
  color: #1a0f00;
}
.nav-btn-gold:hover { background: var(--gold-light); }

.nav-btn-discord {
  background: #5865F2;
  color: #fff;
  display: flex; align-items: center; gap: 6px;
}
.nav-btn-discord:hover { background: #6b77ff; }

/* ── HERO ── */
#hero {
  position: relative;
  height: 100vh; min-height: 620px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
  padding-top: 58px;
}

.hero-bg {
  position: absolute; inset: 0; z-index: 0;
  background: var(--bg) url('images/DarkLord.png') center top/cover no-repeat;
}

.hero-bg::before {
  content: '';
  position: absolute; inset: 0;
  background:
    linear-gradient(to bottom, rgba(6,8,18,0.25) 0%, rgba(6,8,18,0.15) 40%, rgba(6,8,18,0.75) 80%, rgba(6,8,18,1) 100%);
}

.hero-content {
  position: relative; z-index: 2;
  text-align: center;
  padding: 0 1rem;
  max-width: 700px;
}

.hero-logo {
  width: 520px; max-width: 80vw;
  margin: 0 auto 1.5rem;
  margin-top: -80px;
  filter: drop-shadow(0 0 40px rgba(212,168,67,0.7)) drop-shadow(0 0 80px rgba(212,168,67,0.3));
  animation: float 4s ease-in-out infinite, logo-flash 6s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.hero-logo {
  animation: float 4s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(255,255,255,0.9)) drop-shadow(0 0 70px rgba(255,255,255,0.5));
}

/* ── DL HAIR GLOW ── */
#dl-hair-glow {
  position: absolute;
  left: 18%; top: 36%;
  transform: translate(-50%, -50%);
  width: 300px; height: 160px;
  border-radius: 50%;
  background: radial-gradient(ellipse at center,
    rgba(255,255,255,0.5) 0%,
    rgba(220,235,255,0.18) 45%,
    transparent 68%);
  pointer-events: none;
  z-index: 1;
  animation: dl-hair-pulse 4s ease-in-out infinite;
}
@keyframes dl-hair-pulse {
  0%,100% { opacity: 0.15; }
  50%      { opacity: 1; }
}
.hint-pulse {
  opacity: 0.45;
  animation: hint-glow 3s ease-in-out infinite;
}
@keyframes hint-glow {
  0%,100% { opacity: 0.45; text-shadow: none; }
  50%     { opacity: 1; text-shadow: 0 0 10px rgba(212,168,67,0.9), 0 0 24px rgba(212,168,67,0.5); }
}

/* ── CHAIN IMPACT GLOW ── */
#chain-glow {
  position: absolute;
  left: 70%; top: 58%;
  transform: translate(-50%, -50%);
  width: 480px; height: 260px;
  border-radius: 50%;
  background: radial-gradient(ellipse at center,
    rgba(255,90,10,0.75) 0%,
    rgba(255,40,0,0.45) 35%,
    rgba(200,20,0,0.15) 60%,
    transparent 75%);
  pointer-events: none;
  z-index: 1;
  animation: chain-pulse 5s ease-in-out infinite;
}
@keyframes chain-pulse {
  0%,100% { opacity: 0.08; transform: translate(-50%,-50%) scale(0.92); }
  50%      { opacity: 1;    transform: translate(-50%,-50%) scale(1.22); }
}

/* ── CANVAS PARTICLES (toda la página) ── */
#hero-canvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1;
}

/* ── SCROLL FADE-IN CARDS ── */
.anim-fadein {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.55s ease, transform 0.55s ease;
}
.anim-fadein.visible {
  opacity: 1;
  transform: translateY(0);
}

.hero-label {
  font-size: 0.72rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--blue-light);
  margin-bottom: 0.4rem;
}

.hero-title {
  font-size: clamp(2.8rem, 7vw, 5rem);
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 60px rgba(74,158,255,0.4), 0 0 20px rgba(212,168,67,0.3), 0 3px 0 rgba(0,0,0,0.9);
  letter-spacing: 0.04em;
  line-height: 1;
  margin-bottom: 0.5rem;
}

.hero-sub {
  font-size: 0.88rem;
  color: var(--text-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 2rem;
}

.hero-btns {
  display: flex; gap: 0.75rem;
  justify-content: center; flex-wrap: wrap;
  margin-bottom: 0;
}

.btn-hero-main {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0.85rem 2.2rem;
  background: linear-gradient(135deg, #b8941e, #e0b840);
  color: #1a0f00;
  font-size: 0.88rem; font-weight: 800;
  letter-spacing: 0.12em; text-transform: uppercase;
  text-decoration: none; border-radius: 3px;
  box-shadow: 0 4px 25px rgba(212,168,67,0.4);
  transition: all 0.2s;
}
.btn-hero-main:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 35px rgba(212,168,67,0.55); }

.btn-hero-disc {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0.85rem 2rem;
  background: #5865F2;
  color: #fff;
  font-size: 0.88rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  text-decoration: none; border-radius: 3px;
  transition: all 0.2s;
}
.btn-hero-disc:hover { background: #6b77ff; transform: translateY(-1px); }

/* ── STAT BAR ── */
#statbar {
  position: relative; z-index: 3;
  background: rgba(6,8,18,0.97);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.statbar-inner {
  max-width: 1000px; margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  divide: 1px solid var(--border);
}

.statbar-item {
  padding: 1.4rem 1rem;
  text-align: center;
  border-right: 1px solid var(--border);
  position: relative;
}
.statbar-item:last-child { border-right: none; }

.statbar-icon { font-size: 1.3rem; margin-bottom: 0.4rem; }

.statbar-val {
  font-size: 1.8rem; font-weight: 800;
  color: var(--gold);
  text-shadow: 0 0 15px rgba(212,168,67,0.3);
  line-height: 1;
}

.statbar-label {
  font-size: 0.65rem; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--text-muted);
  margin-top: 0.3rem;
}

/* ── SECTION ── */
.section-inner { max-width: 1100px; margin: 0 auto; padding: 5rem 1.5rem; }

.section-head { text-align: center; margin-bottom: 3rem; }

.s-label {
  font-size: 0.7rem; letter-spacing: 0.35em;
  text-transform: uppercase; color: var(--blue-light);
  margin-bottom: 0.4rem;
}

.s-title {
  font-size: clamp(1.7rem, 4vw, 2.4rem);
  font-weight: 800; color: #fff;
  text-shadow: 0 0 30px rgba(74,158,255,0.2);
}

.s-title span { color: var(--gold); }

.s-line {
  width: 50px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--blue-light), transparent);
  margin: 0.9rem auto 0;
}

/* ── FEATURES ── */
#features {
  background: var(--bg2);
  position: relative;
}
#features::before {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  background: url('images/ChatGPT Image Jun 8, 2026, 02_48_49 PM.png') center center/cover no-repeat;
  opacity: 0.08;
}
#features .section-inner { position: relative; z-index: 1; }

.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.feature-card {
  background: var(--bg2);
  padding: 2rem 1.75rem;
  position: relative;
  overflow: hidden;
  transition: background 0.2s;
}
.feature-card:hover { background: var(--bg3); }

.feature-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--blue-light), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}
.feature-card:hover::after { opacity: 1; }

.feat-icon {
  width: 48px; height: 48px; border-radius: 10px;
  background: rgba(74,158,255,0.1);
  border: 1px solid rgba(74,158,255,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
  margin-bottom: 1rem;
}

.feat-icon.gold { background: rgba(212,168,67,0.1); border-color: rgba(212,168,67,0.25); }
.feat-icon.red  { background: rgba(194,59,34,0.1);  border-color: rgba(194,59,34,0.25); }

.feat-title {
  font-size: 1rem; font-weight: 700;
  color: var(--gold); margin-bottom: 0.4rem;
}

.feat-desc {
  font-size: 0.8rem; color: var(--text-muted); line-height: 1.6;
}

/* ── CLIENT FEATURES ── */
#client-features {
  background: var(--bg);
  position: relative;
}
#client-features::before {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  background: url('images/ChatGPT Image Jun 8, 2026, 02_48_49 PM.png') center center/cover no-repeat;
  opacity: 0.06;
}
#client-features .section-inner { position: relative; z-index: 1; }

.cf-highlight {
  background: linear-gradient(135deg, rgba(212,168,67,0.07), rgba(212,168,67,0.03));
  border: 1px solid rgba(212,168,67,0.35);
  border-radius: 8px;
  padding: 2rem 2.5rem;
  margin-bottom: 2rem;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 1.5rem;
  align-items: flex-start;
  position: relative;
  overflow: hidden;
}
.cf-highlight::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.cf-highlight-badge {
  display: inline-block;
  background: rgba(212,168,67,0.15);
  border: 1px solid rgba(212,168,67,0.4);
  color: var(--gold);
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 2px;
  margin-bottom: 0.6rem;
}

.cf-hl-icon {
  width: 64px; height: 64px; border-radius: 12px;
  background: rgba(212,168,67,0.1);
  border: 1px solid rgba(212,168,67,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; flex-shrink: 0;
}

.cf-hl-title {
  font-size: 1.3rem; font-weight: 800;
  color: var(--gold); margin-bottom: 0.4rem;
}

.cf-hl-key {
  display: inline-block;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 4px;
  padding: 2px 10px;
  font-family: monospace;
  font-size: 0.85rem;
  color: #fff;
  margin-right: 6px;
  letter-spacing: 0.05em;
}

.cf-hl-desc {
  font-size: 0.85rem; color: var(--text-muted);
  line-height: 1.7; margin-top: 0.4rem;
}

.cf-hl-sub {
  display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.75rem;
}

.cf-pill {
  background: rgba(74,158,255,0.08);
  border: 1px solid rgba(74,158,255,0.2);
  color: var(--blue-light);
  font-size: 0.85rem;
  padding: 6px 16px;
  border-radius: 20px;
  transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
  cursor: pointer;
}
.cf-pill:hover {
  background: rgba(74,158,255,0.22);
  border-color: rgba(74,158,255,0.7);
  color: #fff;
  box-shadow: 0 0 10px rgba(74,158,255,0.35);
}

.cf-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1rem;
}

.cf-card {
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px;
  padding: 1.25rem 1.5rem;
  display: grid;
  grid-template-columns: 40px 1fr;
  gap: 1rem;
  align-items: flex-start;
  transition: border-color 0.2s;
}
.cf-card:hover { border-color: rgba(212,168,67,0.3); }

.cf-card-icon {
  width: 40px; height: 40px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; flex-shrink: 0;
}
.cf-card-icon.blue { background: rgba(74,158,255,0.1); border: 1px solid rgba(74,158,255,0.2); }
.cf-card-icon.gold { background: rgba(212,168,67,0.1); border: 1px solid rgba(212,168,67,0.2); }
.cf-card-icon.red  { background: rgba(194,59,34,0.1);  border: 1px solid rgba(194,59,34,0.2);  }

.cf-card-title {
  font-size: 0.88rem; font-weight: 700;
  color: var(--text); margin-bottom: 0.3rem;
}
.cf-card-desc {
  font-size: 0.75rem; color: var(--text-muted); line-height: 1.5;
}
.cf-card-key {
  display: inline-block;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 3px;
  padding: 1px 7px;
  font-family: monospace;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.7);
  margin-right: 4px;
}

/* ── CARD MODAL ── */
(function(){
  var modal = document.getElementById('card-modal');
  var modalImg = document.getElementById('card-modal-img');

  modal.style.position = 'fixed';
  modal.style.left = '50%';
  modal.style.top = '50%';
  modal.style.transform = 'translate(-50%,-50%)';
  modal.style.zIndex = '9999';

  document.querySelectorAll('.has-modal').forEach(function(card){
    card.addEventListener('click', function(e){
      e.stopPropagation();
      modalImg.src = card.getAttribute('data-modal-img');
      modal.style.display = 'block';
    });
  });

  document.addEventListener('click', function(){
    modal.style.display = 'none';
  });
})();

/* ── CARD MODAL ── */
(function(){
  var modal = document.getElementById('card-modal');
  var modalImg = document.getElementById('card-modal-img');

  modal.style.position = 'fixed';
  modal.style.left = '50%';
  modal.style.top = '50%';
  modal.style.transform = 'translate(-50%,-50%)';
  modal.style.zIndex = '9999';

  document.querySelectorAll('.has-modal').forEach(function(card){
    card.addEventListener('click', function(e){
      e.stopPropagation();
      modalImg.src = card.getAttribute('data-modal-img');
      modal.style.display = 'block';
    });
  });

  document.addEventListener('click', function(){
    modal.style.display = 'none';
  });
})();
</script><script>
function showTab(el,id){document.querySelectorAll('.etab').forEach(t=>t.classList.remove('active'));el.classList.add('active');['ev-clasicos','ev-invasiones','ev-especiales'].forEach(function(tid){document.getElementById(tid).style.display=tid===id?'grid':'none';});}
</script><script>
(function(){
  var targets=document.querySelectorAll('.feature-card,.cf-card,.ev-card,.cf-hl,.guia-card,.rank-panel,.wc-pack');
  targets.forEach(function(el){el.classList.add('anim-fadein');});
  var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:0.1});
  targets.forEach(function(el){obs.observe(el);});
})();
</script>
